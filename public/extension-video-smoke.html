<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 导演台视频接口自测</title>
    <style>
      body { margin: 0; padding: 24px; color: #e8edf5; background: #15171b; font: 14px/1.6 system-ui, sans-serif; }
      h1 { margin: 0 0 16px; font-size: 20px; letter-spacing: 0; }
      iframe { width: 100%; height: 420px; border: 1px solid #343a46; border-radius: 6px; background: #000; }
      pre { min-height: 100px; padding: 16px; overflow: auto; border: 1px solid #343a46; border-radius: 6px; background: #0e1013; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>3D 导演台视频接口自测</h1>
    <iframe id="director" title="视频接口测试导演台"></iframe>
    <pre id="result" aria-live="polite">等待导演台就绪...</pre>
    <script>
      const director = document.querySelector("#director");
      const result = document.querySelector("#result");
      const origin = window.location.origin;
      let beforeTimeline = null;
      let videoSummary = null;
      let readyHandled = false;
      let exportHandled = false;
      window.__EXTENSION_VIDEO_SMOKE__ = { status: "running" };
      const smokeTimeout = window.setTimeout(() => {
        if (result.dataset.complete === "true") return;
        const report = { status: "failed", ok: false, error: "视频接口自测超时" };
        window.__EXTENSION_VIDEO_SMOKE__ = report;
        result.textContent = JSON.stringify(report, null, 2);
        result.dataset.complete = "true";
        result.dataset.status = "failed";
      }, 20_000);
      director.src = `/?instanceId=extension_video_smoke&benchmark=standard&performance=fluid&benchmarkProgress=0.42&benchmarkPlaying=paused&hostOrigin=${encodeURIComponent(origin)}`;

      function fingerprint(source) {
        const canvas = document.createElement("canvas");
        canvas.width = 64;
        canvas.height = 36;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(source, 0, 0, canvas.width, canvas.height);
        const data = context.getImageData(0, 0, canvas.width, canvas.height).data;
        const pixels = [];
        let luminanceTotal = 0;
        for (let index = 0; index < data.length; index += 4) {
          const red = data[index];
          const green = data[index + 1];
          const blue = data[index + 2];
          pixels.push(red, green, blue);
          luminanceTotal += red * 0.2126 + green * 0.7152 + blue * 0.0722;
        }
        const luminance = luminanceTotal / (canvas.width * canvas.height * 255);
        let varianceTotal = 0;
        for (let index = 0; index < pixels.length; index += 3) {
          const pixelLuminance = (
            pixels[index] * 0.2126
            + pixels[index + 1] * 0.7152
            + pixels[index + 2] * 0.0722
          ) / 255;
          varianceTotal += Math.pow(pixelLuminance - luminance, 2);
        }
        return {
          luminance: Number(luminance.toFixed(6)),
          pixels,
          variance: Number((varianceTotal / (canvas.width * canvas.height)).toFixed(6))
        };
      }

      function pixelDelta(left, right) {
        const total = left.pixels.reduce(
          (sum, value, index) => sum + Math.abs(value - right.pixels[index]),
          0
        );
        return Number((total / (left.pixels.length * 255)).toFixed(6));
      }

      async function seekVideo(video, timeSeconds) {
        await new Promise((resolve, reject) => {
          const timeout = window.setTimeout(() => reject(new Error(`MP4 定位到 ${timeSeconds}s 超时`)), 3000);
          video.onseeked = () => {
            window.clearTimeout(timeout);
            resolve();
          };
          video.onerror = () => {
            window.clearTimeout(timeout);
            reject(new Error(`MP4 定位到 ${timeSeconds}s 失败`));
          };
          video.currentTime = timeSeconds;
        });
      }

      async function inspectVideoBlob(blob, expectedDurationSeconds) {
        const url = URL.createObjectURL(blob);
        const video = document.createElement("video");
        video.muted = true;
        video.playsInline = true;
        video.preload = "auto";
        try {
          await new Promise((resolve, reject) => {
            video.onloadeddata = resolve;
            video.onerror = () => reject(new Error("宿主无法解码接口返回的 MP4"));
            video.src = url;
            video.load();
          });
          const firstTime = Math.min(0.1, expectedDurationSeconds * 0.1);
          const laterTime = Math.max(firstTime + 0.1, expectedDurationSeconds * 0.7);
          await seekVideo(video, firstTime);
          const firstFrame = fingerprint(video);
          const sampledFirstTime = video.currentTime;
          await seekVideo(video, laterTime);
          const laterFrame = fingerprint(video);
          return {
            firstFrameTime: Number(sampledFirstTime.toFixed(3)),
            firstFrameLuminance: firstFrame.luminance,
            firstFrameVariance: firstFrame.variance,
            frameDelta: pixelDelta(firstFrame, laterFrame),
            laterFrameTime: Number(laterTime.toFixed(3)),
            laterFrameLuminance: laterFrame.luminance,
            laterFrameVariance: laterFrame.variance,
            videoHeight: video.videoHeight,
            videoWidth: video.videoWidth
          };
        } finally {
          URL.revokeObjectURL(url);
        }
      }

      function timelinesMatch(left, right) {
        return Boolean(left && right)
          && Math.abs(left.progress - right.progress) <= 0.000001
          && Math.abs(left.timeSeconds - right.timeSeconds) <= 0.000001
          && left.playing === right.playing
          && left.viewMode === right.viewMode
          && left.activeCameraId === right.activeCameraId;
      }

      window.addEventListener("message", async (event) => {
        if (event.origin !== origin || event.source !== director.contentWindow) return;
        if (event.data?.type === "storyai:director-desk-ready") {
          if (readyHandled) return;
          readyHandled = true;
          window.setTimeout(() => director.contentWindow.postMessage({
              type: "storyai:director-desk:request",
              payload: {
                requestId: "smoke-before-timeline",
                action: "timeline.get"
              }
            }, origin), 200);
          return;
        }
        if (event.data?.type !== "storyai:director-desk:response") return;
        const response = event.data.payload;
        if (response.requestId === "smoke-before-timeline") {
          beforeTimeline = response.data;
          director.contentWindow.postMessage({
            type: "storyai:director-desk:request",
            payload: {
              requestId: "smoke-export-video",
              action: "export.video",
              options: { fileName: "接口自测.mp4", fps: 24, quality: "720p" }
            }
          }, origin);
          result.textContent = "正在录制 8 秒参考视频...";
          return;
        }
        if (response.requestId === "smoke-export-video") {
          if (exportHandled) return;
          exportHandled = true;
          const data = response.data;
          if (response.ok) {
            try {
              const inspection = await inspectVideoBlob(data.blob, data.durationSeconds);
              videoSummary = {
                blobSize: data.blob.size,
                blobType: data.blob.type,
                durationSeconds: data.durationSeconds,
                fileName: data.fileName,
                height: data.height,
                mimeType: data.mimeType,
                width: data.width,
                ...inspection
              };
            } catch (error) {
              videoSummary = { error: error instanceof Error ? error.message : "MP4 解码失败" };
            }
          } else {
            videoSummary = response.error;
          }
          director.contentWindow.postMessage({
            type: "storyai:director-desk:request",
            payload: { requestId: "smoke-after-timeline", action: "timeline.get" }
          }, origin);
          return;
        }
        if (response.requestId === "smoke-after-timeline") {
          const timelineRestored = timelinesMatch(beforeTimeline, response.data);
          const passed = response.ok
            && videoSummary
            && !videoSummary.error
            && videoSummary.blobSize > 2000
            && videoSummary.width === 1280
            && videoSummary.height > 0
            && videoSummary.videoWidth === videoSummary.width
            && videoSummary.videoHeight === videoSummary.height
            && videoSummary.firstFrameVariance > 0.00002
            && videoSummary.laterFrameVariance > 0.00002
            && videoSummary.frameDelta > 0.0005
            && timelineRestored;
          const report = {
            status: passed ? "passed" : "failed",
            ok: passed,
            video: videoSummary,
            timelineBefore: beforeTimeline,
            timelineAfter: response.data,
            timelineRestored
          };
          window.__EXTENSION_VIDEO_SMOKE__ = report;
          window.clearTimeout(smokeTimeout);
          result.textContent = JSON.stringify(report, null, 2);
          result.dataset.complete = "true";
          result.dataset.status = report.status;
        }
      });
    </script>
  </body>
</html>
